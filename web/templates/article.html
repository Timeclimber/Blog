<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Article.Title}} - 本地个人博客</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <h1>本地个人博客</h1>
            <nav>
                <a href="/">首页</a>
                <a href="/new">写文章</a>
                <a href="/message">留言板</a>
                <a href="/login" id="login-link">登录</a>
                <a href="/register" id="register-link">注册</a>
                <div id="user-info" style="display: none;">
                    <img id="nav-avatar" src="" alt="头像" class="nav-avatar">
                    <span id="nav-username"></span>
                    <a href="/profile" id="profile-link">个人中心</a>
                    <a href="#" id="logout-link">退出</a>
                </div>
            </nav>
        </div>
    </header>
    <main>
        <section id="article-detail">
            <h2>{{.Article.Title}}</h2>
            <div id="article-meta">{{.Article.CreatedAt.Format "2006-01-02 15:04:05"}}</div>
            <div id="article-tags">
                {{range .Tags}}
                <span class="tag">{{.Name}}</span>
                {{end}}
            </div>
            <div id="article-content">{{.Article.Content}}</div>
        </section>
        <section id="comments">
            <h3>评论</h3>
            <div id="comment-form">
                <form id="comment-submit-form">
                    <textarea id="comment-content" rows="3" placeholder="写下你的评论..."></textarea>
                    <button type="submit">提交评论</button>
                </form>
                <div id="comment-error" class="error-message"></div>
            </div>
            <div id="comment-list">
                {{range .Comments}}
                <div class="comment-item">
                    <p>{{.Content}}</p>
                    <div class="comment-meta">{{.CreatedAt.Format "2006-01-02 15:04:05"}}</div>
                </div>
                {{else}}
                <p>暂无评论</p>
                {{end}}
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 本地个人博客</p>
    </footer>

    <script>
        const DEFAULT_AVATAR = 'https://api.dicebear.com/7.x/avataaars/svg?seed=default';
        const ARTICLE_ID = new URLSearchParams(window.location.search).get('id');

        function checkLoginStatus() {
            const token = localStorage.getItem('token');
            if (token) {
                fetch('/api/user', {
                    headers: { 'Authorization': 'Bearer ' + token }
                })
                .then(response => response.json())
                .then(data => {
                    if (!data.error) {
                        document.getElementById('login-link').style.display = 'none';
                        document.getElementById('register-link').style.display = 'none';
                        document.getElementById('user-info').style.display = 'inline-flex';

                        const avatarUrl = data.avatar_url || DEFAULT_AVATAR;
                        document.getElementById('nav-avatar').src = avatarUrl;
                        document.getElementById('nav-username').textContent = data.username;
                    }
                })
                .catch(() => {});
            }

            document.getElementById('logout-link')?.addEventListener('click', function(e) {
                e.preventDefault();
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                window.location.href = '/';
            });
        }

        // 评论提交
        document.getElementById('comment-submit-form')?.addEventListener('submit', function(e) {
            e.preventDefault();

            const token = localStorage.getItem('token');
            if (!token) {
                alert('请先登录后再评论！');
                window.location.href = '/login';
                return;
            }

            const content = document.getElementById('comment-content').value.trim();
            const errorDiv = document.getElementById('comment-error');

            if (!content) {
                errorDiv.textContent = '评论内容不能为空';
                return;
            }

            fetch('/api/comments', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify({
                    article_id: parseInt(ARTICLE_ID),
                    content: content
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    errorDiv.textContent = data.error;
                } else {
                    errorDiv.textContent = '';
                    document.getElementById('comment-content').value = '';
                    alert('评论成功！');
                    window.location.reload();
                }
            })
            .catch(err => {
                errorDiv.textContent = '评论失败：' + err.message;
            });
        });

        window.onload = checkLoginStatus;
    </script>
</body>
</html>
