<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本地个人博客</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <h1>本地个人博客</h1>
        <nav>
            <a href="/">首页</a>
            <a href="/new">写文章</a>
            <a href="/message">留言板</a>
            <a href="/login" id="login-link">登录</a>
            <a href="/register" id="register-link">注册</a>
            <span id="user-info" style="display: none;"></span>
        </nav>
    </header>
    <main>
        <section id="articles">
            <h2>文章列表</h2>
            <div id="article-list">
                {{range .}}
                <div class="article-item">
                    <h3><a href="/article?id={{.ID}}">{{.Title}}</a></h3>
                    <p>{{.Content}}</p>
                    <div class="article-meta">{{.CreatedAt.Format "2006-01-02 15:04:05"}}</div>
                </div>
                {{else}}
                <p>暂无文章</p>
                {{end}}
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 本地个人博客</p>
    </footer>
</body>
</html>
