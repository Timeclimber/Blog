<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本地个人博客</title>
    <link rel="stylesheet" href="/static/css/style.css?v=2.3.16">
</head>
<body>
    <header>
        <div class="header-container">
            <h1>本地个人博客</h1>
            <nav>
                <a href="/">首页</a>
                <a href="/new">写文章</a>
                <a href="/message">留言板</a>
                <a href="/login" id="login-link">登录</a>
                <a href="/register" id="register-link">注册</a>
                <div id="user-info" style="display: none;">
                    <img id="nav-avatar" src="" alt="头像" class="nav-avatar">
                    <span id="nav-username"></span>
                    <a href="/profile" id="profile-link">个人中心</a>
                    <a href="#" id="logout-link">退出</a>
                </div>
            </nav>
        </div>
    </header>
    <main>
        <section id="articles">
            <h2>文章列表</h2>
            <div id="article-list">
                {{range .}}
                <div class="article-item" data-article-id="{{.ID}}">
                    <div class="article-header">
                        <h3><a href="/article.html?id={{.ID}}">{{.Title}}</a></h3>
                        <button class="article-delete-btn" data-article-id="{{.ID}}" data-user-id="{{if .User}}{{.User.ID}}{{else}}0{{end}}" style="display: none;">删除</button>
                    </div>
                    {{if .User}}
                    <div class="article-author">
                        <img src="{{.User.AvatarURL}}" alt="头像" class="article-avatar" onerror="this.src='https://api.dicebear.com/7.x/avataaars/svg?seed=default'">
                        <span>{{.User.Username}}</span>
                    </div>
                    {{end}}
                    <p>{{.Content}}</p>
                    <div class="article-meta">{{.CreatedAt.Format "2006-01-02 15:04:05"}}</div>
                </div>
                {{else}}
                <p>暂无文章</p>
                {{end}}
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 本地个人博客</p>
    </footer>

    <!-- 自定义确认弹窗 -->
    <div id="confirm-overlay" class="confirm-overlay">
        <div class="confirm-modal">
            <div class="confirm-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 9v4"></path>
                    <path d="M12 17h.01"></path>
                    <circle cx="12" cy="12" r="10"></circle>
                </svg>
            </div>
            <h3 class="confirm-title" id="confirm-title">确认操作</h3>
            <p class="confirm-message" id="confirm-message">确定要执行此操作吗？</p>
            <div class="confirm-buttons">
                <button class="confirm-btn confirm-btn-cancel" id="confirm-cancel">取消</button>
                <button class="confirm-btn confirm-btn-confirm" id="confirm-ok">确定</button>
            </div>
        </div>
    </div>

    <!-- 成功提示弹窗 -->
    <div id="toast-overlay" class="toast-overlay">
        <div class="toast-modal">
            <div class="toast-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            </div>
            <h3 class="toast-title" id="toast-title">操作成功</h3>
            <p class="toast-message" id="toast-message">操作已成功完成！</p>
            <button class="toast-btn" id="toast-ok">确定</button>
        </div>
    </div>

    <script>
        const DEFAULT_AVATAR = 'https://api.dicebear.com/7.x/avataaars/svg?seed=default';
        let currentUser = null;
        let confirmCallback = null;
        let toastCallback = null;

        // 自定义确认弹窗
        function showConfirm(title, message, callback) {
            document.getElementById('confirm-title').textContent = title;
            document.getElementById('confirm-message').textContent = message;
            document.getElementById('confirm-overlay').classList.add('show');
            confirmCallback = callback;
        }

        function hideConfirm() {
            document.getElementById('confirm-overlay').classList.remove('show');
            confirmCallback = null;
        }

        // 自定义成功提示弹窗
        function showToast(title, message, callback) {
            document.getElementById('toast-title').textContent = title;
            document.getElementById('toast-message').textContent = message;
            document.getElementById('toast-overlay').classList.add('show');
            toastCallback = callback;
        }

        function hideToast() {
            document.getElementById('toast-overlay').classList.remove('show');
            if (toastCallback) {
                toastCallback();
            }
            toastCallback = null;
        }

        // 绑定确认弹窗按钮事件
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('confirm-cancel').addEventListener('click', hideConfirm);
            document.getElementById('confirm-ok').addEventListener('click', function() {
                if (confirmCallback) {
                    confirmCallback();
                }
                hideConfirm();
            });
            document.getElementById('confirm-overlay').addEventListener('click', function(e) {
                if (e.target === this) {
                    hideConfirm();
                }
            });

            // 绑定成功提示按钮事件
            document.getElementById('toast-ok').addEventListener('click', hideToast);
            document.getElementById('toast-overlay').addEventListener('click', function(e) {
                if (e.target === this) {
                    hideToast();
                }
            });
        });

        function checkLoginStatus() {
            const token = localStorage.getItem('token');
            if (token) {
                fetch('/api/user', {
                    headers: { 'Authorization': 'Bearer ' + token }
                })
                .then(response => response.json())
                .then(data => {
                    if (!data.error) {
                        currentUser = data;
                        document.getElementById('login-link').style.display = 'none';
                        document.getElementById('register-link').style.display = 'none';
                        document.getElementById('user-info').style.display = 'inline-flex';

                        const avatarUrl = data.avatar_url || DEFAULT_AVATAR;
                        document.getElementById('nav-avatar').src = avatarUrl;
                        document.getElementById('nav-username').textContent = data.username;

                        showDeleteButtons();
                    }
                })
                .catch(() => {});
            }

            // 退出登录
            document.getElementById('logout-link')?.addEventListener('click', function(e) {
                e.preventDefault();
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                window.location.href = '/';
            });
        }

        function showDeleteButtons() {
            if (!currentUser) return;
            document.querySelectorAll('.article-delete-btn').forEach(btn => {
                const articleUserId = parseInt(btn.dataset.userId);
                if (currentUser.id === articleUserId || currentUser.role === 'admin') {
                    btn.style.display = 'inline-block';
                }
            });
        }

        // 删除文章
        document.getElementById('article-list')?.addEventListener('click', function(e) {
            if (e.target.classList.contains('article-delete-btn')) {
                e.preventDefault();
                const articleId = e.target.dataset.articleId;
                const token = localStorage.getItem('token');
                
                if (!token) {
                    showToast('提示', '请先登录！');
                    return;
                }

                showConfirm('删除文章', '确定要删除这篇文章吗？删除后无法恢复！', function() {
                    fetch(`/api/articles/detail/${articleId}`, {
                        method: 'DELETE',
                        headers: {
                            'Authorization': 'Bearer ' + token
                        }
                    })
                    .then(response => response.json())
                    .then(data => {
                        if (data.error) {
                            showToast('错误', data.error);
                        } else {
                            showToast('删除成功', '文章删除成功！', function() {
                                window.location.reload();
                            });
                        }
                    })
                    .catch(err => {
                        showToast('错误', '删除失败：' + err.message);
                    });
                });
            }
        });

        window.onload = checkLoginStatus;
    </script>
</body>
</html>
