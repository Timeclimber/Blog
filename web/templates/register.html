<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 本地个人博客</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .auth-form {
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background: #f9f9f9;
        }
        .auth-form h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
        }
        .form-group input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 3px;
        }
        .form-group button {
            width: 100%;
            padding: 10px;
            background: #333;
            color: #fff;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
        .form-group button:hover {
            background: #555;
        }
        .error-message {
            color: red;
            margin-top: 10px;
            text-align: center;
        }
        .success-message {
            color: green;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-container">
            <h1>本地个人博客</h1>
            <nav>
                <a href="/">首页</a>
                <a href="/new">写文章</a>
                <a href="/message">留言板</a>
                <a href="/login" id="login-link">登录</a>
                <a href="/register" id="register-link">注册</a>
                <div id="user-info" style="display: none;">
                    <img id="nav-avatar" src="" alt="头像" class="nav-avatar">
                    <span id="nav-username"></span>
                    <a href="/profile" id="profile-link">个人中心</a>
                    <a href="#" id="logout-link">退出</a>
                </div>
            </nav>
        </div>
    </header>
    <main>
        <div class="auth-form">
            <h2>用户注册</h2>
            <div id="message" class="error-message"></div>
            <form id="register-form">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" required minlength="3" maxlength="50">
                </div>
                <div class="form-group">
                    <label for="email">邮箱</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" required minlength="6">
                </div>
                <div class="form-group">
                    <button type="submit">注册</button>
                </div>
            </form>
            <p style="text-align: center; margin-top: 15px;">
                已有账号？<a href="/login">立即登录</a>
            </p>
        </div>
    </main>
    <footer>
        <p>&copy; 2026 本地个人博客</p>
    </footer>
    <script>
        const DEFAULT_AVATAR = 'https://api.dicebear.com/7.x/avataaars/svg?seed=default';

        function checkLoginStatus() {
            const token = localStorage.getItem('token');
            if (token) {
                fetch('/api/user', {
                    headers: { 'Authorization': 'Bearer ' + token }
                })
                .then(response => response.json())
                .then(data => {
                    if (!data.error) {
                        document.getElementById('login-link').style.display = 'none';
                        document.getElementById('register-link').style.display = 'none';
                        document.getElementById('user-info').style.display = 'inline-flex';

                        const avatarUrl = data.avatar_url || DEFAULT_AVATAR;
                        document.getElementById('nav-avatar').src = avatarUrl;
                        document.getElementById('nav-username').textContent = data.username;
                    }
                })
                .catch(() => {});
            }

            document.getElementById('logout-link')?.addEventListener('click', function(e) {
                e.preventDefault();
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                window.location.href = '/';
            });
        }

        document.getElementById('register-form').addEventListener('submit', function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const message = document.getElementById('message');

            fetch('/api/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ username, email, password })
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    message.textContent = data.error;
                    message.className = 'error-message';
                } else {
                    message.textContent = '注册成功，请登录';
                    message.className = 'success-message';
                    // 3秒后跳转到登录页
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 3000);
                }
            })
            .catch(error => {
                message.textContent = '注册失败，请稍后重试';
                message.className = 'error-message';
                console.error('Error:', error);
            });
        });

        window.onload = checkLoginStatus;
    </script>
</body>
</html>
