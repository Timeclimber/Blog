<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>写文章 - 本地个人博客</title>
    <link rel="stylesheet" href="/static/css/style.css?v=2.3.17">
</head>
<body>
    <header>
        <div class="header-container">
            <h1>本地个人博客</h1>
            <nav>
                <a href="/">首页</a>
                <a href="/new">写文章</a>
                <a href="/message">留言板</a>
                <a href="/login" id="login-link">登录</a>
                <a href="/register" id="register-link">注册</a>
                <div id="user-info" style="display: none;">
                    <img id="nav-avatar" src="" alt="头像" class="nav-avatar">
                    <span id="nav-username"></span>
                    <a href="/profile" id="profile-link">个人中心</a>
                    <a href="#" id="logout-link">退出</a>
                </div>
            </nav>
        </div>
    </header>
    <main>
        <section id="new-article">
            <h2>写文章</h2>
            <form id="article-form">
                <div class="form-group">
                    <label for="title">标题</label>
                    <input type="text" id="title" name="title" required>
                </div>
                <div class="form-group">
                    <label for="content">内容</label>
                    <textarea id="content" name="content" rows="10" required></textarea>
                </div>
                <div class="form-group">
                    <label for="tags">标签（用逗号分隔）</label>
                    <input type="text" id="tags" name="tags">
                </div>
                <div id="error-message" class="error-message"></div>
                <button type="submit">发布文章</button>
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 本地个人博客</p>
    </footer>

    <!-- 成功提示弹窗 -->
    <div id="toast-overlay" class="toast-overlay">
        <div class="toast-modal">
            <div class="toast-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            </div>
            <h3 class="toast-title" id="toast-title">操作成功</h3>
            <p class="toast-message" id="toast-message">操作已成功完成！</p>
            <button class="toast-btn" id="toast-ok">确定</button>
        </div>
    </div>

    <script>
        const DEFAULT_AVATAR = 'https://api.dicebear.com/7.x/avataaars/svg?seed=default';
        let toastCallback = null;

        // 自定义成功提示弹窗
        function showToast(title, message, callback) {
            document.getElementById('toast-title').textContent = title;
            document.getElementById('toast-message').textContent = message;
            document.getElementById('toast-overlay').classList.add('show');
            toastCallback = callback;
        }

        function hideToast() {
            document.getElementById('toast-overlay').classList.remove('show');
            if (toastCallback) {
                toastCallback();
            }
            toastCallback = null;
        }

        // 绑定成功提示按钮事件
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('toast-ok').addEventListener('click', hideToast);
            document.getElementById('toast-overlay').addEventListener('click', function(e) {
                if (e.target === this) {
                    hideToast();
                }
            });
        });

        function checkLoginStatus() {
            const token = localStorage.getItem('token');
            if (token) {
                fetch('/api/user', {
                    headers: { 'Authorization': 'Bearer ' + token }
                })
                .then(response => response.json())
                .then(data => {
                    if (!data.error) {
                        document.getElementById('login-link').style.display = 'none';
                        document.getElementById('register-link').style.display = 'none';
                        document.getElementById('user-info').style.display = 'inline-flex';

                        const avatarUrl = data.avatar_url || DEFAULT_AVATAR;
                        document.getElementById('nav-avatar').src = avatarUrl;
                        document.getElementById('nav-username').textContent = data.username;
                    }
                })
                .catch(() => {});
            }

            document.getElementById('logout-link')?.addEventListener('click', function(e) {
                e.preventDefault();
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                window.location.href = '/';
            });
        }

        // 文章提交
        document.getElementById('article-form')?.addEventListener('submit', function(e) {
            e.preventDefault();

            const token = localStorage.getItem('token');
            if (!token) {
                showToast('提示', '请先登录后再发布文章！', function() {
                    window.location.href = '/login';
                });
                return;
            }

            const title = document.getElementById('title').value.trim();
            const content = document.getElementById('content').value.trim();
            const tagsInput = document.getElementById('tags').value.trim();
            const errorDiv = document.getElementById('error-message');

            if (!title || !content) {
                errorDiv.textContent = '标题和内容不能为空';
                return;
            }

            fetch('/api/articles', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify({
                    title: title,
                    content: content
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    errorDiv.textContent = data.error;
                } else {
                    showToast('发布成功', '文章发布成功！', function() {
                        window.location.href = '/';
                    });
                }
            })
            .catch(err => {
                errorDiv.textContent = '发布失败：' + err.message;
            });
        });

        window.onload = checkLoginStatus;
    </script>
</body>
</html>
