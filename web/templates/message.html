<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>留言板 - 本地个人博客</title>
    <link rel="stylesheet" href="/static/css/style.css?v=2.3.15">
</head>
<body>
    <header>
        <div class="header-container">
            <h1>本地个人博客</h1>
            <nav>
                <a href="/">首页</a>
                <a href="/new">写文章</a>
                <a href="/message">留言板</a>
                <a href="/login" id="login-link">登录</a>
                <a href="/register" id="register-link">注册</a>
                <div id="user-info" style="display: none;">
                    <img id="nav-avatar" src="" alt="头像" class="nav-avatar">
                    <span id="nav-username"></span>
                    <a href="/profile" id="profile-link">个人中心</a>
                    <a href="#" id="logout-link">退出</a>
                </div>
            </nav>
        </div>
    </header>
    <main>
        <section id="message-board">
            <h2>留言板</h2>
            <div id="message-form">
                <form id="message-submit-form">
                    <div id="message-error" class="error-message"></div>
                    <div class="form-group">
                        <label for="name">姓名</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="content">留言内容</label>
                        <textarea id="content" name="content" rows="3" required></textarea>
                    </div>
                    <button type="submit">提交留言</button>
                </form>
            </div>
            <div id="message-list">
                {{range .}}
                <div class="message-item" data-message-id="{{.ID}}" data-user-id="{{.UserID}}">
                    <div class="message-header">
                        {{if .User}}
                        <img src="{{.User.AvatarURL}}" alt="头像" class="message-avatar" onerror="this.src='https://api.dicebear.com/7.x/avataaars/svg?seed=default'">
                        <span class="message-username">{{.User.Username}}</span>
                        {{else}}
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=default" alt="头像" class="message-avatar">
                        <span class="message-username">{{.Name}}</span>
                        {{end}}
                        <span class="message-time">{{.CreatedAt.Format "2006-01-02 15:04:05"}}</span>
                        <button class="delete-message-btn" style="display: none;" onclick="deleteMessage({{.ID}})">删除</button>
                    </div>
                    <div class="message-content">{{.Content}}</div>
                </div>
                {{else}}
                <p>暂无留言</p>
                {{end}}
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 本地个人博客</p>
    </footer>

    <!-- 自定义确认弹窗 -->
    <div id="confirm-overlay" class="confirm-overlay">
        <div class="confirm-modal">
            <div class="confirm-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 9v4"></path>
                    <path d="M12 17h.01"></path>
                    <circle cx="12" cy="12" r="10"></circle>
                </svg>
            </div>
            <h3 class="confirm-title" id="confirm-title">确认操作</h3>
            <p class="confirm-message" id="confirm-message">确定要执行此操作吗？</p>
            <div class="confirm-buttons">
                <button class="confirm-btn confirm-btn-cancel" id="confirm-cancel">取消</button>
                <button class="confirm-btn confirm-btn-confirm" id="confirm-ok">确定</button>
            </div>
        </div>
    </div>

    <script>
        const DEFAULT_AVATAR = 'https://api.dicebear.com/7.x/avataaars/svg?seed=default';
        let currentUser = null;
        let confirmCallback = null;

        // 自定义确认弹窗
        function showConfirm(title, message, callback) {
            document.getElementById('confirm-title').textContent = title;
            document.getElementById('confirm-message').textContent = message;
            document.getElementById('confirm-overlay').classList.add('show');
            confirmCallback = callback;
        }

        function hideConfirm() {
            document.getElementById('confirm-overlay').classList.remove('show');
            confirmCallback = null;
        }

        // 绑定确认弹窗按钮事件
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('confirm-cancel').addEventListener('click', hideConfirm);
            document.getElementById('confirm-ok').addEventListener('click', function() {
                if (confirmCallback) {
                    confirmCallback();
                }
                hideConfirm();
            });
            document.getElementById('confirm-overlay').addEventListener('click', function(e) {
                if (e.target === this) {
                    hideConfirm();
                }
            });
        });

        function checkLoginStatus() {
            const token = localStorage.getItem('token');
            if (token) {
                fetch('/api/user', {
                    headers: { 'Authorization': 'Bearer ' + token }
                })
                .then(response => response.json())
                .then(data => {
                    if (!data.error) {
                        currentUser = data;
                        document.getElementById('login-link').style.display = 'none';
                        document.getElementById('register-link').style.display = 'none';
                        document.getElementById('user-info').style.display = 'inline-flex';

                        const avatarUrl = data.avatar_url || DEFAULT_AVATAR;
                        document.getElementById('nav-avatar').src = avatarUrl;
                        document.getElementById('nav-username').textContent = data.username;
                        
                        // 显示删除按钮（仅作者或管理员）
                        showDeleteButtons();
                    }
                })
                .catch(() => {});
            }

            document.getElementById('logout-link')?.addEventListener('click', function(e) {
                e.preventDefault();
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                window.location.href = '/';
            });
        }

        // 显示删除按钮
        function showDeleteButtons() {
            if (!currentUser) return;
            
            document.querySelectorAll('.message-item').forEach(item => {
                const messageUserId = parseInt(item.dataset.userId);
                const deleteBtn = item.querySelector('.delete-message-btn');
                
                if (deleteBtn && (messageUserId === currentUser.id || currentUser.role === 'admin')) {
                    deleteBtn.style.display = 'inline-block';
                }
            });
        }

        // 删除留言
        function deleteMessage(messageId) {
            showConfirm('删除留言', '确定要删除这条留言吗？删除后无法恢复！', function() {
                const token = localStorage.getItem('token');
                if (!token) {
                    alert('请先登录');
                    return;
                }

                fetch('/api/messages/' + messageId, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': 'Bearer ' + token
                    }
                })
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        alert(data.error);
                    } else {
                        alert('留言删除成功！');
                        window.location.reload();
                    }
                })
                .catch(err => {
                    alert('删除失败：' + err.message);
                });
            });
        }

        // 留言提交
        document.getElementById('message-submit-form')?.addEventListener('submit', function(e) {
            e.preventDefault();

            const token = localStorage.getItem('token');
            if (!token) {
                alert('请先登录后再留言！');
                window.location.href = '/login';
                return;
            }

            const name = document.getElementById('name').value.trim();
            const content = document.getElementById('content').value.trim();
            const errorDiv = document.getElementById('message-error');

            if (!name || !content) {
                errorDiv.textContent = '姓名和留言内容不能为空';
                errorDiv.classList.add('show');
                return;
            }

            fetch('/api/messages', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify({ name, content })
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    errorDiv.textContent = data.error;
                    errorDiv.classList.add('show');
                } else {
                    errorDiv.textContent = '';
                    errorDiv.classList.remove('show');
                    document.getElementById('name').value = '';
                    document.getElementById('content').value = '';
                    alert('留言成功！');
                    window.location.reload();
                }
            })
            .catch(err => {
                errorDiv.textContent = '留言失败：' + err.message;
                errorDiv.classList.add('show');
            });
        });

        window.onload = checkLoginStatus;
    </script>
</body>
</html>
